apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: allrest-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: comodo-eu-cert
      
    nginx.ingress.kubernetes.io/limit-rps-key: "$http_api_key"
    nginx.ingress.kubernetes.io/limit-whitelist: "143.198.249.29/32"
    
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    
    # === CONFIGURATION SNIPPET (BOT, CORS, CACHING, SECURITY) ===
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # === 1. IP BLOCK (Fastest check - from ConfigMap) ===
      if ($deny) { return 444; }
      
      # === 2. BLOCK HEAD REQUESTS (catches scanners early) ===
      # Many scanners use HEAD requests to check if pages exist
      if ($request_method = HEAD) { return 403; }
      
      # === 3. CONSOLIDATED BAD BOT BLOCK (NEW + EXISTING COMBINED) ===
      # Combined all bot patterns in one rule for efficiency
      if ($http_user_agent ~* "(SemrushBot|AhrefsBot|MJ12bot|BLEXBot|DotBot|SeznamBot|Sogou|ZoominfoBot|Netcraft|CensysInspect|python-requests|curl|wget|Go-http-client|Java/|okhttp|aiohttp|rest-client|HTTrack|Nmap|sqlmap|masscan|acunetix|Nikto|ZAP|wpscan|GPTBot|ChatGPT|OpenAI|Anthropic|ClaudeBot|PerplexityBot|cohere-ai|YandexGPTBot|Meta-ExternalAgent|AppleBot-Extended|AmazonBot|AI2Bot|Bytespider|PyntBot|CCBot|Diffbot|Scrapy|axios|node-fetch|php|libwww-perl|httpclient|PetalBot|MegaIndex)") { 
          return 403; 
      }
      
      # === 4. OUTDATED/FAKE BROWSERS (EXISTING - REORDERED) ===
      # Blocks old Chrome versions and suspicious browsers
      if ($http_user_agent ~* "(Chrome/(27|29|34|41|62|63|65|67|68|75|84)\.|AOLBUILD|ADG|MSIE 8\.0|Firefox/3\.8|Firefox/13\.0|Windows NT 5\.1|Brave|^$|^-?$|null|CravingExplorer)") { return 403; }

      # === 5. DEEP PAGINATION BLOCK (EXISTING) ===
      # Blocks requests with very high page numbers (scrapers)
      if ($arg_page ~ "^(?:32[1-9]|3[3-9]\d|[4-9]\d{2,}|\d{4,})$") { return 403; }
      # if ($arg_page ~ "^(15[1-9]|[1-9]\d{3,}|[2-9]\d{2,})$") { return 403; }
      
      # === FIX: BLOCK page[size]=10000 ATTACKS ===
      # Attackers use ?page[size]=10000 - this blocks it properly
      set $block_bad_pagination 0;
      
      # Block page[size] with 4+ digits (1000, 10000, 100000)
      if ($args ~ "page\[size\]=[0-9]{4,}") {
          set $block_bad_pagination 1;
      }
      
      # Block page[size] with 50-99
      if ($args ~ "page\[size\]=[5-9][0-9]") {
          set $block_bad_pagination 1;
      }
      
      # Specifically block page[size]=10000
      if ($args ~ "page\[size\]=10000") {
          set $block_bad_pagination 1;
      }
      
      # Also block page parameter with high values
      if ($args ~ "page=[0-9]{4,}") {
          set $block_bad_pagination 1;
      }
      
      if ($block_bad_pagination = 1) {
          return 403;
      }
      
      # Blocks sequential page scraping (e.g., ?page=1&page=2)
      set $page_abuse 0;
      if ($args ~ "page=[^&]+.*page=") { set $page_abuse 1; }
      if ($args ~ "page=[^&]+&.*page=") { set $page_abuse 1; }
      if ($page_abuse = 1) { return 403; }

      
      # === 6. BLOCK UNWANTED URI SCHEMES (EXISTING) ===
      if ($request_uri ~* "(tel:|javascript:|data:)") { return 403; }
     
      # ===  BLOCK SUSPICIOUS PATH STRUCTURES ===
      # Blocks paths with city names followed by phone numbers
      if ($request_uri ~* "/[a-z-]+/tel:[0-9]+") { return 403; }

      # Block requests where the first path segment is not a valid language
      # if ($request_uri ~* "^/(?!de/|en/|pl/|es/|pt/|tr/|ru/|ar/|fr/)[a-z]{2,}/") { return 403; }
      
      # Blocks language-language patterns like /en-en/ or /pl-en/
      if ($request_uri ~* "/(de|en|pl|es|pt|tr|ru|ar|fr)-(de|en|pl|es|pt|tr|ru|ar|fr)(/|$)") { return 403; }
      
      # Blocks repeated language loops like /en/en/en/
      if ($request_uri ~* "/(de|en|pl|es|pt|tr|ru|ar|fr)/\1/") { return 403; }
      
      # Blocks extremely deep paths (SEO spam generators)
      if ($request_uri ~* "(/[^/]+){10,}") { return 403; }

            
      # === ALLOW GOOD BOTS (EXISTING - after blocking bad ones) ===
      set $allow_good_bot 0;
      if ($http_user_agent ~* "(Googlebot|GoogleOther|AdsBot-Google|Bingbot|BingPreview|Slurp|DuckDuckBot|Applebot|Twitterbot|FacebookExternalHit|LinkedInBot|TelegramBot|Pinterest|WhatsApp)") { 
          set $allow_good_bot 1; 
      }
      if ($allow_good_bot = 1) { 
          break; 
      }
      
      # === CRITICAL FIX: GLOBAL VARY HEADER (EXISTING) ===
      add_header Vary "Accept-Encoding" always;
      
      # === JS PRELOAD OPTIMIZATION (EXISTING) ===
      if ($request_uri ~* "(main|bundle|app)\.js$") {
        add_header Link "</$request_uri>; rel=preload; as=script" always;
      }
      
      # === SECURITY HEADERS (EXISTING) ===
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      
      # === 11. CACHING RULES (EXISTING) ===
      if ($request_uri ~* "\\.(?:jpg|jpeg|png|gif|webp|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm|pdf)$") {
        add_header Cache-Control "public, max-age=7776000, immutable" always;
        add_header Expires "Thu, 31 Dec 2037 23:59:59 GMT" always;
        add_header Pragma "public" always;
        add_header Vary "Accept-Encoding" always;
      }
      
      if ($arg_page ~ "^[0-9]+$") {
        add_header Cache-Control "public, max-age=600" always;
      }
      
      if ($http_user_agent ~* "(bot|crawler|spider|archive|scanner|fetch|slurp)(/|;|$| )") {
        add_header Cache-Control "public, max-age=300" always;
      }
      
      # === CORS HANDLING (EXISTING) ===
      if ($request_method = OPTIONS) {
        add_header "Access-Control-Allow-Origin" "$http_origin" always;
        add_header "Access-Control-Allow-Credentials" "true" always;
        add_header "Access-Control-Allow-Methods" "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header "Access-Control-Allow-Headers" "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header "Content-Length" 0;
        return 204;
      }
      
      if ($http_origin ~* "^https://([a-z0-9-]+\\.)*allrestaurants\\.eu$") {
        add_header "Access-Control-Allow-Origin" "$http_origin" always;
        add_header "Access-Control-Allow-Credentials" "true" always;
        add_header "Access-Control-Allow-Methods" "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header "Access-Control-Allow-Headers" "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
      }



spec:
  tls:
    - hosts:
        - admin.allrestaurants.eu
        - api.allrestaurants.eu
        - allsupplier.allrestaurants.eu
        - allrestaurants.eu
        - "{{ .Values.allUrl }}"
        - "{{ .Values.mainUrl }}"
      secretName: ssl-nginx-eu-new
  rules:
    # --- ADMIN PANEL ---
    - host: admin.allrestaurants.eu
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: alltm-admin-panel-service
                port:
                  number: 80

    - host: {{ .Values.adminUrl }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: alltm-admin-panel-service
                port:
                  number: 80

    # --- API ---

    - host: {{ .Values.apiUrl }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: alltm-api-service
                port:
                  number: 80

    - host: allrestaurants.eu
      http:
        paths:
          - pathType: Prefix
            path: /api/v1/allrest/
            backend:
              service:
                name: allrest-api-service
                port:
                  number: 80
          - pathType: Prefix
            path: /api/v1/allsupplier
            backend:
              service:
                name: allsupplier-api-service
                port:
                  number: 80

    # --- PUBLIC WEBSITE (PHP BACKEND) ---
    - host: allrestaurants.eu
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80

    # --- WILDCARD SUBDOMAINS ---
    - host: "*.allrestaurants.eu"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80

    # --- SECONDARY DOMAIN ---
    - host: allrestaurants.info
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80

    # --- STATIC FILES ---
    - host: allrestaurants.eu
      http:
        paths:
          - pathType: Prefix
            path: /svg/
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80
          - pathType: Prefix
            path: /js/
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80
          - pathType: Prefix
            path: /css/
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80
          - pathType: Prefix
            path: /fonts/
            backend:
              service:
                name: allrest-php-service
                port:
                  number: 80
