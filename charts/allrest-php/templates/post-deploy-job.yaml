# Navigate to the correct directory
cd /var/www/project/charts/allrest-php/templates

# Create the file
cat > post-deploy-job.yaml << 'EOF'
apiVersion: batch/v1
kind: Job
metadata:
  name: allrest-php-permissions
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: fix-permissions
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          kubectl exec -it deployment/allrest-php -- chown -R www-data:www-data /var/www/project/storage || true
          kubectl exec -it deployment/allrest-php -- chmod -R 775 /var/www/project/storage || true
          echo "Permissions fixed!"
      restartPolicy: OnFailure
EOF
